<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Queens-eye — Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede0;
    --panel: #faf3e6;
    --ink: #2a1a10;
    --ink-2: #5a3e2a;
    --ink-3: #9a7e62;
    --line: #e6d8be;
    --line-2: #efe4cd;
    --accent: #b8332a;
    --gold: oklch(0.72 0.13 80);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family: "Inter Tight", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  textarea, input { font: inherit; outline: none; }
  .serif { font-family: "Instrument Serif", serif; font-style: italic; }

  .shell { max-width: 760px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; padding: 0 24px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0 14px;
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .mark { color: var(--accent); display: flex; }
  .name { font-weight: 600; font-size: 15px; }
  .sub { font-size: 11.5px; color: var(--ink-3); font-family: "Instrument Serif", serif; font-style: italic; }
  .back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: var(--ink-3); text-decoration: none;
  }
  .back:hover { color: var(--accent); }

  .chat {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 24px 0;
    display: flex; flex-direction: column; gap: 14px;
  }
  .empty {
    margin: auto; text-align: center;
    color: var(--ink-3); display: flex; flex-direction: column; gap: 12px;
    align-items: center; max-width: 36ch;
  }
  .empty .big {
    font-family: "Instrument Serif", serif; font-style: italic;
    font-size: 32px; line-height: 1.15; color: var(--ink);
  }
  .empty .big span { color: var(--accent); }
  .empty p { font-size: 13px; color: var(--ink-2); margin: 0; }

  .bub {
    max-width: 86%; padding: 12px 14px;
    border-radius: 14px; font-size: 13.5px; line-height: 1.55;
    white-space: pre-wrap;
  }
  .bub.user {
    align-self: flex-end;
    background: var(--ink); color: var(--bg);
    border-bottom-right-radius: 4px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 12.5px;
  }
  .bub.bot {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
    color: var(--ink);
    white-space: normal;
  }
  .bub.bot h4 {
    margin: 0 0 8px; font-size: 11.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px; color: var(--accent);
  }
  .bub.bot ul { margin: 6px 0 0; padding-left: 18px; }
  .bub.bot li { margin-bottom: 6px; }
  .typing { align-self: flex-start; padding: 14px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; }
  .typing span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); margin: 0 2px; animation: dot 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dot { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  .composer {
    border-top: 1px solid var(--line);
    padding: 14px 0 18px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .box {
    border: 1px solid var(--line); border-radius: 14px;
    background: var(--panel);
    display: flex; flex-direction: column;
  }
  .box textarea {
    width: 100%; min-height: 64px; max-height: 220px;
    padding: 12px 14px; border: 0; background: transparent; resize: none;
    font-size: 13.5px; line-height: 1.5; color: var(--ink);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  .box textarea::placeholder { color: var(--ink-3); font-style: italic; font-family: "Instrument Serif", serif; font-size: 14px; }
  .box-foot {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px 6px 14px; border-top: 1px solid var(--line);
  }
  .count { font-size: 11px; color: var(--ink-3); margin-right: auto; }
  .send {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 10px;
    background: var(--accent); color: #faf3e6;
    font-size: 12.5px; font-weight: 600;
  }
  .send:disabled { opacity: 0.4; cursor: not-allowed; }
  .send:hover:not(:disabled) { transform: translateY(-1px); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 11.5px; padding: 5px 11px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink-2);
  }
  .chip:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="12" cy="12" r="3.2" fill="currentColor"/>
          <circle cx="12" cy="12" r="6.2" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
        </svg>
      </div>
      <div>
        <div class="name">Queens-eye <span class="serif" style="color:var(--ink-3);font-weight:400;">· assistant</span></div>
        <div class="sub">paste your day · get a briefing</div>
      </div>
    </div>
    <a class="back" href="Queens-eye Calendar.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M15 6l-6 6 6 6"/></svg>
      Calendar
    </a>
  </header>

  <div class="chat" id="chat">
    <div class="empty" id="empty">
      <div class="big">Tell me about your <span>day</span>.</div>
      <p>Add events, move them, cancel them. Or ask for a summary, prep notes, or focus time.</p>
    </div>
  </div>

  <div class="composer">
    <div class="box">
      <textarea id="paste" placeholder="Add, move, or cancel an event. Or ask anything…"></textarea>
      <div class="box-foot">
        <div class="count" id="count">0 lines</div>
        <button class="chip" id="sample">Sample</button>
        <button class="send" id="send" disabled>
          <span>Send</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
    <div class="chips">
      <button class="chip" data-ask="Summarize today">Summarize today</button>
      <button class="chip" data-ask="What should I prep for today?">What to prep for?</button>
      <button class="chip" data-ask="Find me a focus block today">Find focus time</button>
      <button class="chip" data-ask="Any conflicts today?">Any conflicts?</button>
    </div>
  </div>
</div>

<script>
  // Shared with the Calendar page. Same keys.
  const KEY_EVENTS = "qe.events.v2";

  function loadEvents() {
    try {
      const raw = localStorage.getItem(KEY_EVENTS);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch { return []; }
  }
  function saveEvents(events) {
    try { localStorage.setItem(KEY_EVENTS, JSON.stringify(events)); } catch (e) { console.error(e); }
  }
  function newId() { return "asst-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7); }

  function applyMutations(mutations) {
    if (!Array.isArray(mutations) || mutations.length === 0) return [];
    const events = loadEvents();
    const summaries = [];
    for (const m of mutations) {
      if (m.type === "create" && m.event && m.event.title && m.event.start && m.event.end) {
        events.push({
          id: newId(),
          cal: m.event.cal || "personal",
          title: m.event.title,
          start: m.event.start,
          end: m.event.end,
          where: m.event.where,
          who: m.event.who,
        });
        summaries.push(`Added "${m.event.title}" on ${fmtWhen(m.event.start)}.`);
      } else if (m.type === "update" && m.id) {
        const idx = events.findIndex((e) => e.id === m.id);
        if (idx >= 0) {
          const before = events[idx];
          events[idx] = { ...before, ...(m.patch || {}) };
          const parts = [];
          if (m.patch?.title) parts.push(`title to "${m.patch.title}"`);
          if (m.patch?.start) parts.push(`start to ${fmtWhen(m.patch.start)}`);
          if (m.patch?.end) parts.push(`end to ${fmtWhen(m.patch.end)}`);
          if (m.patch?.where) parts.push(`location to ${m.patch.where}`);
          if (m.patch?.cal) parts.push(`calendar to ${m.patch.cal}`);
          summaries.push(`Updated "${before.title}" (${parts.join(", ") || "no fields"}).`);
        }
      } else if (m.type === "delete" && m.id) {
        const idx = events.findIndex((e) => e.id === m.id);
        if (idx >= 0) {
          const removed = events.splice(idx, 1)[0];
          summaries.push(`Deleted "${removed.title}".`);
        }
      }
    }
    saveEvents(events);
    return summaries;
  }

  function fmtWhen(iso) {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString("en-US", { timeZone: "America/Toronto", weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  }
  function torontoOffset() {
    const dtf = new Intl.DateTimeFormat("en-US", { timeZone: "America/Toronto", timeZoneName: "shortOffset" });
    const tzn = dtf.formatToParts(new Date()).find((p) => p.type === "timeZoneName")?.value || "GMT-05:00";
    const m = tzn.match(/GMT([+\-])(\d{1,2})(?::?(\d{2}))?/);
    if (!m) return "-05:00";
    return `${m[1]}${String(parseInt(m[2], 10)).padStart(2, "0")}:${m[3] || "00"}`;
  }

  const $ = (s) => document.querySelector(s);
  const paste = $("#paste"), send = $("#send"), count = $("#count"), chat = $("#chat"), empty = $("#empty");

  function update() {
    const lines = paste.value.split(/\n/).filter((l) => l.trim()).length;
    count.textContent = `${lines} line${lines === 1 ? "" : "s"}`;
    send.disabled = !paste.value.trim();
    paste.style.height = "auto";
    paste.style.height = Math.min(220, paste.scrollHeight) + "px";
  }
  paste.addEventListener("input", update);
  $("#sample").addEventListener("click", () => {
    const cnt = loadEvents().length;
    paste.value = cnt === 0
      ? "I have a 1:1 with Maya tomorrow at 9, standup at 9:30, lunch with Daniel at 12:45 at Yu Kitchen."
      : "Summarize my day and flag any conflicts.";
    update(); paste.focus();
  });

  function esc(s) { return s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  function addBub(role, html) {
    const d = document.createElement("div");
    d.className = "bub " + role; d.innerHTML = html;
    chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
  }
  function addTyping() {
    const d = document.createElement("div");
    d.className = "typing"; d.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
  }

  const convo = [];

  async function callAgent(userText) {
    convo.push({ role: "user", content: userText });
    const res = await fetch("/api/agent", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: convo,
        events: loadEvents(),
        nowISO: new Date().toISOString(),
        userTZ: "America/Toronto",
        nowOffset: torontoOffset(),
      }),
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`agent ${res.status}: ${errText.slice(0, 200)}`);
    }
    const data = await res.json();
    const reply = (data.reply || "").trim();
    if (reply) convo.push({ role: "assistant", content: reply });
    return data;
  }

  async function trigger() {
    const v = paste.value.trim(); if (!v) return;
    if (empty.parentNode) empty.remove();
    addBub("user", esc(v));
    paste.value = ""; update();
    const t = addTyping();
    try {
      const data = await callAgent(v);
      const summaries = applyMutations(data.mutations);
      t.remove();
      const lines = [];
      if (data.reply) lines.push(esc(data.reply).replace(/\n/g, "<br>"));
      if (summaries.length) lines.push(`<div style="margin-top:6px;color:var(--accent);font-size:12px"><b>${summaries.map(esc).join("<br>")}</b></div>`);
      addBub("bot", lines.join("") || (data.mutations?.length ? "Done." : "(no response)"));
    } catch (err) {
      t.remove();
      addBub("bot", `<span style="color:var(--accent)">Error:</span> ${esc(err.message || String(err))}`);
    }
  }

  send.addEventListener("click", trigger);
  paste.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); trigger(); }
  });
  document.querySelectorAll(".chip[data-ask]").forEach((b) => {
    b.addEventListener("click", () => { paste.value = b.dataset.ask; update(); paste.focus(); });
  });

  update();
</script>
</body>
</html>

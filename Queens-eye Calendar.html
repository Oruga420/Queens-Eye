<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Queens-eye — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede0;
    --panel: #faf3e6;
    --ink: #2a1a10;
    --ink-2: #5a3e2a;
    --ink-3: #9a7e62;
    --line: #e6d8be;
    --line-2: #efe4cd;
    --accent: oklch(0.50 0.20 25);
    --accent-soft: oklch(0.94 0.04 60);
    --warn: oklch(0.50 0.20 25);
    --good: oklch(0.62 0.10 80);
    --gold: oklch(0.72 0.13 80);
    --hour-h: 56px;
    --radius: 10px;
    --shadow-sm: 0 1px 2px rgba(20,18,10,0.04), 0 1px 0 rgba(20,18,10,0.02);
    --shadow-md: 0 6px 24px -8px rgba(20,18,10,0.18), 0 2px 6px rgba(20,18,10,0.06);
    --shadow-lg: 0 24px 60px -20px rgba(20,18,10,0.35), 0 6px 18px rgba(20,18,10,0.08);
  }
  [data-theme="dark"] {
    --bg: #1a0e08;
    --panel: #221610;
    --ink: #f3e6d2;
    --ink-2: #c9b290;
    --ink-3: #8a6f52;
    --line: #382418;
    --line-2: #2a1a11;
    --accent: oklch(0.65 0.20 25);
    --accent-soft: oklch(0.30 0.10 25);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter Tight", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  .serif { font-family: "Instrument Serif", serif; font-style: italic; }
  #root { height: 100vh; }

  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
</style>
</head>
<body>
<script src="auth.js"></script>
<div id="root"></div>

<script type="application/json" id="__tweak_defaults__">
/*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "#b8332a",
  "density": "balanced",
  "dictationStyle": "fab",
  "hourHeight": 64,
  "weekStart": "mon",
  "showWeather": true
}/*EDITMODE-END*/
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tz.jsx"></script>
<script type="text/babel" src="storage.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="day-view.jsx"></script>
<script type="text/babel" src="week-view.jsx"></script>
<script type="text/babel" src="month-view.jsx"></script>
<script type="text/babel" src="dictation.jsx"></script>
<script type="text/babel" src="event-popover.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
